name: AmbientGen
options:
  bundleIdPrefix: com.ambigen
targets:
  AmbientGen:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ambigen.AmbientGen
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "-"
      ENABLE_HARDENED_RUNTIME: YES
      CODE_SIGN_ENTITLEMENTS: Sources/AmbientGen.entitlements
    info:
      path: Sources/Info.plist
      properties:
        LSUIElement: true
        NSHighResolutionCapable: true
    dependencies:
      - target: AmbientGenWidget

  AmbientGenWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: WidgetSources
      - path: Sources/WidgetStateBridge.swift
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ambigen.AmbientGen.Widget
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "-"
      ENABLE_HARDENED_RUNTIME: YES
      CODE_SIGN_ENTITLEMENTS: WidgetSources/AmbientGenWidget.entitlements
    info:
      path: WidgetSources/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
